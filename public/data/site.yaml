research:
  - id: "ip-project"
    title: "Journey to SC2031: Fundamentals of Parallel and High-performance Computing"
    venue: "Interdisciplinary Project Report at HPCC HCMUT"
    abstract: "This report is submitted as part of the Programming Integration Project, formally registered under the topic ``Work Stealing on GPUs''. Rather than presenting a narrowly focused investigation of a single algorithmic technique, the report aims to consolidate fundamental concepts, system-level knowledge, and practical experimentation in the broader domains of Parallel Computing and High-Performance Computing (HPC). This report is submitted as part of the Programming Integration Project and is formally registered under the topic “Work Stealing on GPUs”. Rather than presenting a narrowly focused investigation of a single algorithmic technique, the report aims to consolidate fundamental concepts, system-level knowledge, and practical experimentation in the broader domains of Parallel Computing and High-Performance Computing (HPC). The primary objective of this work is to establish a solid theoretical and experimental foundation covering CPU and GPU architectures, memory hierarchies, cache behavior, synchronization mechanisms, and parallel scheduling strategies. Through a combination of architectural analysis and empirical evaluation, particularly using matrix multiplication workloads implemented with sequential, OpenMP, and CUDA-based approaches, the report demonstrates how low-level design decisions influence performance on modern multicore and manycore systems. Due to its exploratory and integrative nature, the report does not follow a single linear research narrative. Instead, it is structured as a curated collection of concepts, experiments, and observations that reflect the learning trajectory required for advanced HPC research. This work is intended to serve as a preparatory step toward future, more specialized research contributions in parallel runtime systems and GPU scheduling, with long-term aspirations of participating in the Supercomputing (SC) conference."
    link: "/public/pdf/[2026][PIP_HCMUT][nguyenpanda][v1.0.0].pdf"
    isHighlight: true
    isHPC: true
    date: "2026-01-03"
    keywords:
      - "Hardware Cache"
      - "OpenMP"
      - "CPU"
      - "GPU"
      - "CUDA"
  - id: "matrix-multiplication"
    title: "Performance Study of Large-Scale Square Matrix Multiplication Algorithms on Various Parallel Platforms"
    venue: "Parallel Computing (CO3001) Assignment"
    abstract: "This report investigates the performance characteristics of square matrix multiplication across three computational paradigms: shared memory, distributed memory, and GPU acceleration."
    link: "/public/pdf/[2025][CO3067_HCMUT][nguyenpanda_et_al][v1.0.0].pdf"
    isHighlight: true
    isHPC: true
    date: "2025-12-17"
    keywords:
      - "Evaluation"
      - "CUDA"
      - "OpenMP"
      - "OpenMPI"
