name: Deploy to Amazon ECS

on:
  push:
    branches:
      # - main
  workflow_dispatch:
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: nguyenpanda-fargate
  ECS_SERVICE: nguyenpanda-fargate-service
  ECS_CLUSTER: nguyenpanda-fargate-cluster
  ECS_TASK_DEFINITION: .github/workflows/task-definition.json
  CONTAINER_NAME: nguyenpanda-fargate

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.3"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition ${{ env.ECR_REPOSITORY }} --query taskDefinition > ${{ env.ECS_TASK_DEFINITION }}

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Automatically Destroy Infrastructure on Failure
        if: failure() # Chỉ kích hoạt bước này nếu bất kỳ bước nào ở trên bị lỗi (Build lỗi, ECS treo...)
        run: |
          # Tự động tìm thư mục chứa các file code Terraform của bạn để dọn dẹp
          if [ -d "terraform-fargate" ]; then
            echo "🚨 Phát hiện lỗi deploy ứng dụng! Tiến hành hủy hạ tầng tại folder terraform-fargate..."
            cd terraform-fargate
            terraform init
            terraform destroy -auto-approve || true
          elif [ -d "terraform" ]; then
            echo "🚨 Phát hiện lỗi deploy ứng dụng! Tiến hành hủy hạ tầng tại folder terraform..."
            cd terraform
            terraform init
            terraform destroy -auto-approve || true
          else
            echo "⚠️ Không tìm thấy thư mục chứa code Terraform (.tf) để thực hiện lệnh hủy."
          fi
